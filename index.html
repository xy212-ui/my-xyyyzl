<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鑫源供应链 · 运营品质看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --card2: #1c2230;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2563eb;
      --accent2: #0ea5e9;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --orange: #f97316;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "HarmonyOS Sans", sans-serif;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #0d1117 0%, #1a2236 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #dateRange {
      font-size: 13px; color: var(--accent2);
      background: rgba(14,165,233,0.1);
      border: 1px solid rgba(14,165,233,0.3);
      border-radius: 6px;
      padding: 4px 12px;
    }
    #updatedAt {
      font-size: 12px; color: var(--muted);
      background: rgba(139,148,158,0.1);
      border: 1px solid rgba(139,148,158,0.2);
      border-radius: 6px;
      padding: 4px 10px;
    }
    .upload-zone {
      display: flex; gap: 10px;
    }
    .upload-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(37,99,235,0.15);
      border: 1px dashed rgba(37,99,235,0.5);
      color: var(--accent2);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .upload-btn:hover {
      background: rgba(37,99,235,0.25);
      border-color: var(--accent2);
    }
    .upload-btn input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-btn .icon { font-size: 16px; }

    /* ===== SYNC STATUS BAR ===== */
    .sync-bar {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 8px;
      padding: 10px 20px;
      margin: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .sync-bar .sync-icon { font-size: 18px; }
    .sync-bar .sync-text { color: var(--text); }
    .sync-bar .sync-hint { color: var(--muted); margin-left: auto; }

    /* ===== MAIN ===== */
    main { padding: 24px 32px; max-width: 1800px; margin: 0 auto; }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; margin-top: 28px;
    }
    .section-title::before {
      content: ''; width: 4px; height: 18px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 2px;
    }

    /* ===== KPI GRID ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .kpi-card .glow {
      position: absolute; top: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.15;
    }
    .kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 800; line-height: 1; }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .kpi-badge {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 100px;
      margin-top: 8px;
    }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .kpi-clickable { cursor: pointer; transition: transform 0.15s; }
    .kpi-clickable:hover { transform: translateY(-2px); }
    .kpi-clickable:hover .kpi-detail-hint { opacity: 1; }
    .kpi-detail-hint { font-size: 11px; color: var(--muted); opacity: 0.6; margin-top: 4px; transition: opacity 0.2s; }

    /* ===== DETAIL MODAL ===== */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #1c2333; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; width: 90%; max-width: 520px; max-height: 80vh;
      padding: 24px; overflow: hidden;
      transform: translateY(20px); transition: transform 0.25s;
    }
    .modal-overlay.active .modal-box { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: #e6edf3; }
    .modal-close {
      width: 32px; height: 32px; border: none; background: rgba(255,255,255,0.08);
      color: #8b949e; font-size: 18px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: #e6edf3; }
    .modal-table-wrap { overflow-y: auto; max-height: calc(80vh - 80px); }
    .modal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .modal-table th {
      background: rgba(255,255,255,0.06); color: #8b949e;
      padding: 8px 12px; text-align: center; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-table td {
      padding: 8px 12px; text-align: center; color: #e6edf3;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .modal-table tr:hover td { background: rgba(255,255,255,0.04); }
    .modal-count { font-size: 13px; color: #8b949e; margin-bottom: 8px; }

    /* ===== CHART GRID ===== */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-card h3 {
      font-size: 14px; font-weight: 600; color: var(--muted);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 6px;
    }
    .chart-card h3 .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent2);
    }
    .chart-wrap { position: relative; height: 260px; }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--card2);
      padding: 10px 12px;
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(48,54,61,0.5);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(37,99,235,0.06); }
    tbody td {
      padding: 9px 12px;
      white-space: nowrap;
    }
    .td-name { font-weight: 600; color: var(--text); }
    .pct { font-size: 11px; color: var(--muted); }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; min-width: 60px; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-green { background: var(--green); }
    .bar-red { background: var(--red); }
    .bar-yellow { background: var(--yellow); }

    /* ===== PENALTY GRID ===== */
    .penalty-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ===== TABS ===== */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      padding: 7px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted);
    }
    .tab.active {
      background: rgba(37,99,235,0.2);
      border-color: var(--accent);
      color: var(--accent2);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-size: 13px; color: var(--text);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s; z-index: 999;
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ===== LOADING ===== */
    #loading {
      position: fixed; inset: 0;
      background: rgba(13,17,23,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 998;
      display: none;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== PROGRESS RING ===== */
    .ring-wrap {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      flex-wrap: wrap;
    }
    .ring-item { text-align: center; }
    .ring-label { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .ring-val { font-size: 13px; font-weight: 700; }

    @media (max-width: 768px) {
      header { padding: 0 16px; flex-wrap: wrap; height: auto; padding-top: 12px; padding-bottom: 12px; }
      .header-right { flex-wrap: wrap; }
      main { padding: 16px; }
      .chart-grid { grid-template-columns: 1fr; }
      .penalty-grid { grid-template-columns: 1fr; }
      .sync-bar { margin: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-icon">🚚</div>
    <div>
      <div class="logo-text">鑫源供应链运营品质看板</div>
      <div class="logo-sub">Xinyuan Supply Chain Quality Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div id="updatedAt">更新时间：--</div>
    <div id="dateRange">日期：--</div>
    <div class="upload-zone">
      <label class="upload-btn">
        <span class="icon">📊</span>
        <span>上传时效报表</span>
        <input type="file" accept=".xlsx,.xls" id="fileTimeEffect" />
      </label>
      <label class="upload-btn">
        <span class="icon">📋</span>
        <span>上传操作规范报表</span>
        <input type="file" accept=".xlsx,.xls" id="fileOperation" />
      </label>
    </div>
  </div>
</header>

<div class="sync-bar" id="syncBar">
  <span class="sync-icon">🌐</span>
  <span class="sync-text">数据已同步至云端 — 所有人打开此链接即可看到最新数据</span>
  <span class="sync-hint" id="syncHint">上传Excel后数据自动保存，全员实时可见</span>
</div>

<main>
  <!-- KPI 总览 -->
  <div class="section-title">📦 核心 KPI 总览</div>
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- 时效分析 -->
  <div class="section-title">⏱ 时效分析</div>
  <div class="tabs">
    <div class="tab active" data-tab="delivery">送货时效</div>
    <div class="tab" data-tab="transfer">中转时效</div>
  </div>
  <div class="tab-panel active" id="tab-delivery">
    <div class="chart-grid">
      <div class="chart-card">
        <h3><span class="dot"></span>各站点送货时效分布（%）</h3>
        <div class="chart-wrap"><canvas id="chartDelivery"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><span class="dot" style="background:var(--red)"></span>超48小时送货排行</h3>
        <div class="chart-wrap"><canvas id="chartDeliveryOver"></canvas></div>
      </div>
    </div>
    <div class="chart-card" style="margin-top:20px">
      <h3><span class="dot"></span>送货时效明细表</h3>
      <div class="table-wrap"><table id="tableDelivery"></table></div>
    </div>
  </div>
  <div class="tab-panel" id="tab-transfer">
    <div class="chart-grid">
      <div class="chart-card">
        <h3><span class="dot" style="background:var(--purple)"></span>各站点中转时效分布（%）</h3>
        <div class="chart-wrap"><canvas id="chartTransfer"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><span class="dot" style="background:var(--red)"></span>超48小时中转排行</h3>
        <div class="chart-wrap"><canvas id="chartTransferOver"></canvas></div>
      </div>
    </div>
    <div class="chart-card" style="margin-top:20px">
      <h3><span class="dot" style="background:var(--purple)"></span>中转时效明细表</h3>
      <div class="table-wrap"><table id="tableTransfer"></table></div>
    </div>
  </div>

  <!-- 系统操作规范 -->
  <div class="section-title">📋 系统操作规范化</div>
  <div class="chart-grid">
    <div class="chart-card">
      <h3><span class="dot" style="background:var(--yellow)"></span>各站点预罚合计（元）</h3>
      <div class="chart-wrap"><canvas id="chartPenalty"></canvas></div>
    </div>
    <div class="chart-card">
      <h3><span class="dot" style="background:var(--orange)"></span>异常类型分布</h3>
      <div class="chart-wrap"><canvas id="chartAbnormal"></canvas></div>
    </div>
  </div>
  <div class="chart-card" style="margin-top:20px">
    <h3><span class="dot" style="background:var(--yellow)"></span>系统操作规范明细表</h3>
    <div class="table-wrap"><table id="tableOperation"></table></div>
  </div>
</main>

<!-- 明细弹窗 -->
<div id="detailModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modalTitle" class="modal-title">明细</span>
      <button id="modalClose" class="modal-close">×</button>
    </div>
    <div id="modalCount" class="modal-count">共 0 条记录</div>
    <div id="modalTableWrap" class="modal-table-wrap"></div>
  </div>
</div>

<div id="toast">✅ 数据加载成功</div>
<div id="loading"><div class="spinner"></div><p style="margin-top:12px;color:var(--muted);font-size:13px">正在解析数据...</p></div>

<script>
// ============================================================
//  工具函数
// ============================================================
const $ = id => document.getElementById(id);
let charts = {};

function showToast(msg, isErr) {
  const t = $('toast');
  t.innerHTML = (isErr ? '❌ ' : '✅ ') + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoading(v) { $('loading').style.display = v ? 'flex' : 'none'; }
function pct(v) { return (parseFloat(v) * 100).toFixed(1) + '%'; }
function fmtPct(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '-';
  return (n * 100).toFixed(1) + '%';
}
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

// ============================================================
//  格式化更新时间
// ============================================================
function formatTime(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0');
}

// ============================================================
//  Tab 切换
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ============================================================
//  读取 Excel
// ============================================================
function readExcel(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        res(wb);
      } catch(err) { rej(err); }
    };
    reader.onerror = rej;
    reader.readAsArrayBuffer(file);
  });
}

function sheetToRows(ws) {
  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
}

// ============================================================
//  解析时效报表
// ============================================================
function parseTimeEffect(wb) {
  const data = {};

  // 送货时效播报表
  if (wb.SheetNames.includes('送货时效播报表')) {
    const rows = sheetToRows(wb.Sheets['送货时效播报表']);
    const titleStr = String(rows[0]?.[0] || '');
    const m = titleStr.match(/(\d+\.\d+[-–~]\d+\.\d+|\d+月[\s\S]{0,20})/);
    data.dateRange = m ? m[0].trim() : titleStr.replace(/\s+/g, ' ').trim();

    const delivery = [];
    for (let i = 3; i < rows.length; i++) {
      const r = rows[i];
      if (!r[0] || String(r[0]).trim() === '') continue;
      delivery.push({
        name: String(r[0]).trim(),
        total: parseInt(r[1]) || 0,
        over48: parseInt(r[2]) || 0,
        over48pct: parseFloat(r[3]) || 0,
        over48fine: parseInt(r[4]) || 0,
        h24_48: parseInt(r[5]) || 0,
        h24_48pct: parseFloat(r[6]) || 0,
        h24: parseInt(r[7]) || 0,
        h24pct: parseFloat(r[8]) || 0,
        abnormal: parseInt(r[9]) || 0,
      });
    }
    data.delivery = delivery;
  }

  // 中转时效播报表
  if (wb.SheetNames.includes('中转时效播报表')) {
    const rows = sheetToRows(wb.Sheets['中转时效播报表']);
    const transfer = [];
    for (let i = 3; i < rows.length; i++) {
      const r = rows[i];
      if (!r[0] || String(r[0]).trim() === '') continue;
      transfer.push({
        name: String(r[0]).trim(),
        total: parseInt(r[1]) || 0,
        over48: parseInt(r[2]) || 0,
        over48pct: parseFloat(r[3]) || 0,
        over48fine: parseInt(r[4]) || 0,
        h24_48: parseInt(r[5]) || 0,
        h24_48pct: parseFloat(r[6]) || 0,
        h24: parseInt(r[7]) || 0,
        h24pct: parseFloat(r[8]) || 0,
        abnormal: parseInt(r[9]) || 0,
      });
    }
    data.transfer = transfer;
  }

  return data;
}

// ============================================================
//  解析操作规范报表
// ============================================================
function parseOperation(wb) {
  const data = {};

  const sheetName = wb.SheetNames.find(n => n.includes('播报表')) || wb.SheetNames[0];
  const rows = sheetToRows(wb.Sheets[sheetName]);

  const ops = [];
  for (let i = 3; i < rows.length; i++) {
    const r = rows[i];
    const name = String(r[0] || '').trim();
    if (!name || name.startsWith('说明') || name.startsWith('1：') || name.startsWith('2：') || name.startsWith('3：')) break;
    ops.push({
      name,
      totalFine: parseFloat(r[1]) || 0,
      openTotal: parseInt(r[2]) || 0,
      openAbnormal: parseInt(r[3]) || 0,
      openPct: parseFloat(r[4]) || 0,
      openFine: parseFloat(r[5]) || 0,
      loadTotal: parseInt(r[6]) || 0,
      loadAbnormal: parseInt(r[7]) || 0,
      loadPct: parseFloat(r[8]) || 0,
      loadFine: parseFloat(r[9]) || 0,
      delivTotal: parseInt(r[10]) || 0,
      delivAbnormal: parseInt(r[11]) || 0,
      delivPct: parseFloat(r[12]) || 0,
      delivFine: parseFloat(r[13]) || 0,
      confirmTickets: parseInt(r[14]) || 0,
      confirmFine: parseFloat(r[15]) || 0,
      selfPickup: String(r[16] || '').trim(),
      selfPickupFine: parseFloat(r[17]) || 0,
    });
  }
  data.ops = ops;

  const complainSheet = wb.SheetNames.find(n => n.includes('有责异常'));
  if (complainSheet) {
    const cRows = sheetToRows(wb.Sheets[complainSheet]);
    data.complainCount = cRows.slice(1).filter(r => r.some(v => String(v).trim() !== '')).length;
  } else {
    data.complainCount = 0;
  }

  return data;
}

  const s2 = wb.SheetNames.find(n => n.includes('超48小时中转明细') || n.includes('超48h中转明细'));

// ============================================================

function parseOperationDetails(wb) {

// 从服务器或localStorage获取最新数据
async function fetchServerData() {
  // 1. 尝试从服务器API获取
  try {
    const resp = await fetch('/api/data');
    const result = await resp.json();
    if (result.success && result.data) {
      if (result.data.timeEffect) STATE.timeEffect = result.data.timeEffect;
      if (result.data.operation) STATE.operation = result.data.operation;
      if (result.data.details) STATE.details = result.data.details;
      if (result.data.updatedAt) {
        $('updatedAt').textContent = '更新时间：' + formatTime(result.data.updatedAt);
      }
      // 同时缓存到localStorage
      saveToLocal();
      $('syncBar').style.background = 'rgba(34,197,94,0.08)';
      $('syncBar').style.borderColor = 'rgba(34,197,94,0.2)';
      $('syncHint').textContent = '✅ 数据来自服务器，全员可见';
      return true;
    }
  } catch (err) {
    console.warn('服务器不可达，尝试本地缓存:', err);
  }

  // 2. 尝试从localStorage获取
  try {
    const local = localStorage.getItem('xinyuan_dashboard_data');
    if (local) {
      const data = JSON.parse(local);
      if (data.timeEffect) STATE.timeEffect = data.timeEffect;
      if (data.operation) STATE.operation = data.operation;
      if (data.details) STATE.details = data.details;
      if (data.updatedAt) {
        $('updatedAt').textContent = '更新时间：' + formatTime(data.updatedAt);
      }
      $('syncBar').style.background = 'rgba(245,158,11,0.08)';
      $('syncBar').style.borderColor = 'rgba(245,158,11,0.2)';
      $('syncHint').textContent = '⚠️ 数据来自本地缓存，仅当前浏览器可见（需部署后端服务器才能全员共享）';
      return true;
    }
  } catch (err) {
    console.warn('localStorage读取失败:', err);
  }

  return false;
}

// 保存数据到localStorage
function saveToLocal() {
  try {
    const data = {
      timeEffect: STATE.timeEffect,
      operation: STATE.operation,
      details: STATE.details,
      updatedAt: STATE.updatedAt || new Date().toISOString(),
    };
    localStorage.setItem('xinyuan_dashboard_data', JSON.stringify(data));
  } catch (err) {
    console.warn('localStorage保存失败:', err);
  }
}

// 保存数据到服务器
async function saveToServer() {
  // 先保存到localStorage（确保本地也有）
  STATE.updatedAt = new Date().toISOString();
  saveToLocal();
  $('updatedAt').textContent = '更新时间：' + formatTime(STATE.updatedAt);

  // 尝试保存到服务器
  try {
    const resp = await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        timeEffect: STATE.timeEffect,
        operation: STATE.operation,
        details: STATE.details,
      }),
    });
    const result = await resp.json();
    if (result.success) {
      $('updatedAt').textContent = '更新时间：' + formatTime(result.updatedAt);
      $('syncBar').style.background = 'rgba(34,197,94,0.08)';
      $('syncBar').style.borderColor = 'rgba(34,197,94,0.2)';
      $('syncHint').textContent = '✅ 数据已保存至服务器，全员可见';
      showToast('数据已同步至云端，所有人可查看');
      // 更新localStorage缓存
      STATE.updatedAt = result.updatedAt;
      saveToLocal();
    } else {
      $('syncBar').style.background = 'rgba(245,158,11,0.08)';
      $('syncBar').style.borderColor = 'rgba(245,158,11,0.2)';
      $('syncHint').textContent = '⚠️ 数据已保存至本地，仅当前浏览器可见';
      showToast('数据已保存（本地模式），部署后端后可实现全员共享');
    }
  } catch (err) {
    console.warn('保存到服务器失败:', err);
    $('syncBar').style.background = 'rgba(245,158,11,0.08)';
    $('syncBar').style.borderColor = 'rgba(245,158,11,0.2)';
    $('syncHint').textContent = '⚠️ 数据已保存至本地，仅当前浏览器可见';
    showToast('数据已保存（本地模式），部署后端后可实现全员共享');
  }
}

  if (te?.delivery) {
    const d = te.delivery.find(r => r.name === '总计') || te.delivery[0];
    const ontime48 = d.h24 + d.h24_48;
    const ontime48pct = d.total > 0 ? ontime48 / d.total : 0;
    cards.push({
      label: '送货总票数',
      value: d.total.toLocaleString(),
      sub: '本期累计',
      color: '#2563eb',
      badge: null
    });
    cards.push({
      label: '送货准时率（48h内）',
      value: (ontime48pct * 100).toFixed(1) + '%',
      sub: `48h内送达 ${ontime48} 票`,
      color: '#22c55e',
      badge: ontime48pct >= 0.95 ? { text: '达标', cls: 'badge-green' } : { text: '待提升', cls: 'badge-yellow' }
    });
    cards.push({
      label: '超48h送货票数',
      value: d.over48.toLocaleString(),
      sub: `占比 ${(d.over48pct * 100).toFixed(1)}%`,
      color: '#ef4444',

      detail: 'deliveryOver48'
    });
  }

  if (te?.transfer) {
    const t = te.transfer.find(r => r.name === '总计') || te.transfer[0];
    const ontime48 = t.h24 + t.h24_48;
    const ontime48pct = t.total > 0 ? ontime48 / t.total : 0;
    cards.push({
      label: '中转总票数',
      value: t.total.toLocaleString(),
      sub: '本期累计',
      color: '#a855f7',
      badge: null
    });
    cards.push({
      label: '中转准时率（48h内）',
      value: (ontime48pct * 100).toFixed(1) + '%',
      sub: `48h内中转 ${ontime48} 票`,
      color: '#22c55e',
      badge: ontime48pct >= 0.95 ? { text: '达标', cls: 'badge-green' } : { text: '待提升', cls: 'badge-yellow' }
    });
    cards.push({
      label: '超48h中转票数',
      value: t.over48.toLocaleString(),
      sub: `占比 ${(t.over48pct * 100).toFixed(1)}%`,
      color: '#ef4444',
      badge: t.over48 > 0 ? { text: '需关注', cls: 'badge-red' } : { text: '良好', cls: 'badge-green' },
      detail: 'transferOver48'
    });
  }

  if (op?.ops) {
    const total = op.ops.find(r => r.name === '合计') || op.ops[0];
    cards.push({
      label: '签收异常票数',
      value: total.delivAbnormal.toLocaleString(),
      sub: `签收总票 ${total.delivTotal}`,
      color: '#f97316',
      badge: total.delivAbnormal === 0 ? { text: '零异常', cls: 'badge-green' } : { text: '需整改', cls: 'badge-red' },
      detail: 'signAbnormal'
    });
    cards.push({
      label: '到货确认延迟票数',
      value: total.confirmTickets.toLocaleString(),
      sub: `预罚 ¥${total.confirmFine}`,
      color: '#f59e0b',
      badge: total.confirmTickets === 0 ? { text: '零异常', cls: 'badge-green' } : { text: '需整改', cls: 'badge-red' },
      detail: 'confirmDelay'
    });
    const complainCount = op.complainCount ?? 0;
    cards.push({
      label: '有责投诉票数',
      value: complainCount.toLocaleString(),
      sub: '本期有责异常',
      color: '#ef4444',
      badge: complainCount === 0 ? { text: '零投诉', cls: 'badge-green' } : { text: '需跟进', cls: 'badge-red' },
      detail: 'complain'
    });
  }

  cards.forEach(c => {
    const el = document.createElement('div');
    el.className = 'kpi-card' + (c.detail ? ' kpi-clickable' : '');
    if (c.detail) el.setAttribute('data-detail', c.detail);
    el.innerHTML = `
      <div class="glow" style="background:${c.color}"></div>
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value" style="color:${c.color}">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>

      ${c.detail ? '<div class="kpi-detail-hint">点击查看明细 ▸</div>' : ''}
    `;
    if (c.detail) {
      el.addEventListener('click', () => showDetailModal(c.label, c.detail));
    }
    grid.appendChild(el);
  });
}

// ============================================================
//  表格渲染
// ============================================================
function renderTable(id, rows, opts = {}) {
  const table = $(id);
  table.innerHTML = '';
  rows.forEach((row, ri) => {
    const tr = document.createElement('tr');
    row.forEach((cell, ci) => {
      const td = document.createElement(ri === 0 ? 'th' : 'td');
      td.textContent = cell;
      if (ri > 0 && ci === 0) td.className = 'td-name';
      if (ri > 0 && opts.colorCols) {
        const color = opts.colorCols[ci];
        if (color === 'red' && cell !== '0.0%' && cell !== '-' && cell !== '0%') td.style.color = '#ef4444';
        if (color === 'green') td.style.color = '#22c55e';
      }
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}

// ============================================================
//  Chart 配置工厂
// ============================================================
function baseChartOpts() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 10 } },
      tooltip: { mode: 'index', intersect: false }
    },
    scales: {
      x: { ticks: { color: '#8b949e', font: { size: 10 }, maxRotation: 35 }, grid: { color: 'rgba(255,255,255,0.04)' } },
      y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' } }
    }
  };
}
function chartStackedOpts(yLabel) {
  const opts = baseChartOpts();
  opts.scales.x.stacked = true;
  opts.scales.y.stacked = true;
  opts.scales.y.max = 100;
  opts.scales.y.ticks.callback = v => v + '%';
  return opts;
}
function chartBarOpts(yLabel, color) {
  const opts = baseChartOpts();
  opts.plugins.legend = { display: false };
  return opts;
}

});

// ============================================================
//  ★★★ 页面初始化：优先服务器 → 其次本地缓存 → 最后内置数据 ★★★
// ============================================================
async function init() {
  showLoading(true);
  const hasData = await fetchServerData();
  if (hasData && (STATE.timeEffect || STATE.operation)) {
    // 有数据（来自服务器或本地缓存），直接使用
    renderAll();
  } else {
    // 无任何数据，使用内置默认数据，并保存到本地
    loadDefaultData();
    STATE.updatedAt = new Date().toISOString();
    saveToLocal();
    // 尝试保存到服务器（如果服务器可用）
    try {
      await saveToServer();
    } catch (err) { /* 忽略 */ }
  }
  showLoading(false);
}

init();

// ============================================================
//  明细弹窗功能
// ============================================================
function showDetailModal(title, detailKey) {
  const overlay = $('detailModal');
  const list = STATE.details[detailKey] || [];
  
  $('modalTitle').textContent = title + ' 明细';
  $('modalCount').textContent = `共 ${list.length} 条记录`;
  
  let html = '<table class="modal-table"><thead><tr><th>序号</th><th>单号</th><th>网点</th></tr></thead><tbody>';
  list.forEach((item, i) => {
    html += `<tr><td>${i + 1}</td><td>${item.id}</td><td>${item.station}</td></tr>`;
  });
  html += '</tbody></table>';
  
  $('modalTableWrap').innerHTML = html;
  overlay.classList.add('active');
}

// 关闭弹窗
$('modalClose').addEventListener('click', () => $('detailModal').classList.remove('active'));
$('detailModal').addEventListener('click', e => { if (e.target === $('detailModal')) $('detailModal').classList.remove('active'); });
